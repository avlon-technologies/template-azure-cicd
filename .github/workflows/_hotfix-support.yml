name: Hotfix/Support Pipeline

on:
  workflow_call:
    inputs:
      branch-type:
        description: hotfix or support
        type: string
        required: true
      event-name:
        description: github.event_name from the calling workflow
        type: string
        required: true
      ref-name:
        description: github.ref_name from the calling workflow
        type: string
        required: true
      sha:
        description: github.sha from the calling workflow
        type: string
        required: true

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      # When an existing artifact is reused, its stamped label (from the
      # promote step) wins over the freshly derived one — the binary is the
      # source of truth for what it reports.
      version: ${{ steps.promote.outputs.version || steps.version.outputs.value }}
      promote-artifact: ${{ steps.promote.outputs.artifact }}
      promote-run-id: ${{ steps.promote.outputs.run-id }}
      promote-image-digest: ${{ steps.promote.outputs.image-digest }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history: the label embeds the commit height
          # (git rev-list --count), which a shallow clone would report as 1.
          # Treeless partial clone keeps this cheap as history grows — the
          # count needs commit objects only, no trees or blobs.
          fetch-depth: 0
          filter: tree:0

      - name: Derive version from the commit
        id: version
        # The label is deterministic — branch name + commit height — so every
        # build of the same commit produces the same label, and the push
        # build's artifact is reusable when the deploy is dispatched later.
        env:
          REF: ${{ inputs.ref-name }}
          BRANCH_TYPE: ${{ inputs.branch-type }}
        run: |
          # The dispatch form's branch selector defaults to the repo's default
          # branch (develop) — reject anything that isn't actually a
          # <branch-type>/* branch before touching version logic, so a
          # mis-set selector fails fast instead of building/deploying the
          # wrong ref.
          if [[ "$REF" != ${BRANCH_TYPE}/* ]]; then
            echo "::error::This workflow must be run from a $BRANCH_TYPE/* branch, not '$REF'. Check the 'Use workflow from' branch selector on the dispatch form — it defaults to the repository's default branch."
            exit 1
          fi
          BRANCH_VERSION="${REF#${BRANCH_TYPE}/}"
          # The prod pipeline can only detect and promote semantic versions
          # (on-main.yml parses X.Y.Z from the merge commit subject) —
          # reject other shapes here, before a candidate is built and
          # staged, not after the merge to main.
          if [[ ! "$BRANCH_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::${BRANCH_TYPE^} branch version must be X.Y.Z (got '$BRANCH_VERSION' from '$REF'). Rename the branch, e.g. $BRANCH_TYPE/1.2.1."
            exit 1
          fi
          SUFFIX=$([[ "$BRANCH_TYPE" == "hotfix" ]] && echo "hotfix" || echo "patch")
          HEIGHT=$(git rev-list --count HEAD)
          VALUE="$BRANCH_VERSION-$SUFFIX.$HEIGHT"
          # Labels become artifact/marker names and git tags — restrict to a
          # safe charset. The auto-generated label inherits the branch name,
          # which can carry characters artifact names reject; checked on
          # every event because push builds now upload marker artifacts too.
          if [[ ! "$VALUE" =~ ^[0-9A-Za-z.-]+$ ]]; then
            echo "::error::Label '$VALUE' contains unsupported characters (allowed: letters, digits, '.', '-'). Rename the branch."
            exit 1
          fi
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

      - name: Locate existing artifact
        id: promote
        # Same contract as the release pipeline: labels are commit-derived,
        # so the push build was stamped with the same label this dispatch
        # resolved — reuse its artifact. If the marker disagrees (the
        # derivation changed between push and dispatch), the existing stamp
        # wins — the version is compiled into the binary, and re-labeling
        # would ship an app that reports the wrong version.
        if: inputs.event-name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ inputs.sha }}
          DERIVED: ${{ steps.version.outputs.value }}
          BRANCH_TYPE: ${{ inputs.branch-type }}
        run: |
          # Provenance check: artifact *names* are forgeable — any workflow
          # in the repo can upload one called webapp-<sha>. Reuse only an
          # artifact whose producing run was this branch type's entry
          # workflow building this exact commit (shared, tested logic:
          # .github/scripts/find-verified-artifact.sh); anything else is
          # ignored. Falling through to a rebuild is always safe (same
          # commit derives the same label).
          NAME="webapp-$SHA"
          source .github/scripts/find-verified-artifact.sh
          find_verified_artifact "$NAME" "$SHA" ".github/workflows/on-${BRANCH_TYPE}.yml"
          RUN_ID="$FVA_RUN_ID"
          if [ -z "$RUN_ID" ]; then
            echo "No trusted existing artifact for $SHA (push build expired, predates this commit, or failed the provenance check) — will build."
            exit 0
          fi
          # Markers from the verified run — the stamped label (what the
          # binary reports) and the image digest (what the deploy pins).
          # One artifact-list fetch serves both; parsing is shared, tested
          # logic (.github/scripts/run-markers.sh).
          source .github/scripts/run-markers.sh
          MARKER_NAMES=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts?per_page=100" \
            --jq '.artifacts[].name')
          EXISTING_LABEL=$(marker_value "$MARKER_NAMES" "$NAME.label.") || EXISTING_LABEL=""
          if [ -z "$EXISTING_LABEL" ]; then
            echo "Artifact $NAME exists but carries no label marker (built before markers were introduced) — rebuilding."
            exit 0
          fi
          EXISTING_DIGEST=$(marker_value "$MARKER_NAMES" "$NAME.image.") || EXISTING_DIGEST=""
          if [ -z "$EXISTING_DIGEST" ]; then
            echo "Artifact $NAME has no image-digest marker (built before container deploys) — rebuilding."
            exit 0
          fi
          if [ "$EXISTING_LABEL" != "$DERIVED" ]; then
            echo "::warning::Existing artifact is stamped '$EXISTING_LABEL' (derived '$DERIVED' — label derivation changed since the push build). Deploying the binary as what it actually reports."
            echo "⚠️ **Label drift:** existing artifact is stamped \`$EXISTING_LABEL\` but the current derivation yields \`$DERIVED\`. Deploying under the stamped label — push a new commit to adopt the new derivation." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Reusing existing artifact $NAME (label '$EXISTING_LABEL', image sha256:$EXISTING_DIGEST) from run $RUN_ID — build will be skipped."
          echo "artifact=$NAME" >> $GITHUB_OUTPUT
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "version=$EXISTING_LABEL" >> $GITHUB_OUTPUT
          echo "image-digest=sha256:$EXISTING_DIGEST" >> $GITHUB_OUTPUT

  build:
    if: needs.prepare.outputs.promote-run-id == ''
    needs: prepare
    permissions:
      contents: read
      checks: write
      pull-requests: write
      # attest: true needs these — provenance attestation on the manifest.
      id-token: write
      attestations: write
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      # Every build on a hotfix/support branch is promotable: labels are
      # commit-derived, so the push build already carries the label a later
      # dispatch will resolve. Commit-keyed name, 90-day retention.
      artifact-name: webapp-${{ inputs.sha }}
      retention-days: 90
      attest: true

  image:
    # Push builds stage the image too, so a later dispatch (and the prod
    # promotion) reuses the exact image digest without rebuilding anything.
    if: ${{ !failure() && !cancelled() && needs.prepare.outputs.promote-run-id == '' }}
    needs: [prepare, build]
    permissions:
      id-token: write
      contents: read
      attestations: write
    uses: ./.github/workflows/_image.yml
    with:
      # stg identity builds hotfix/support images (Tasks Contributor +
      # AcrPull on the shared registry).
      environment: stg
      build-label: ${{ needs.build.outputs.build-label }}
      artifact-name: webapp-${{ inputs.sha }}
      image-repository: ${{ vars.IMAGE_REPOSITORY }}
      retention-days: 90

  deploy:
    if: ${{ !failure() && !cancelled() && inputs.event-name == 'workflow_dispatch' }}
    needs: [prepare, build, image]
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: stg
      build-label: ${{ needs.prepare.outputs.promote-run-id != '' && needs.prepare.outputs.version || needs.build.outputs.build-label }}
      image-digest: ${{ needs.prepare.outputs.promote-image-digest || needs.image.outputs.image-digest }}
      image-repository: ${{ vars.IMAGE_REPOSITORY }}
      # stg tags are the prod promotion gate's proof of a green staging
      # deploy and the QA/UAT audit trail.
      tag-deployment: true
