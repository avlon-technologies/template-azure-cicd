name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name (dev | stg | prod)
        type: string
        required: true
      webapp-name:
        description: Azure App Service name to deploy to
        type: string
        required: true
      azure-client-id:
        description: App Registration client ID for OIDC login
        type: string
        required: true
      build-label:
        description: Build label (YYYYMMDD.run_number) used to tag the deployment commit
        type: string
        required: true
      slot-swap:
        description: Deploy to the staging slot, smoke test, then swap (requires a Standard+ plan with a "staging" slot)
        type: boolean
        required: false
        default: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-publish
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.azure-client-id }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        if: ${{ !inputs.slot-swap }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.webapp-name }}
          package: ./publish

      - name: Deploy to staging slot
        if: ${{ inputs.slot-swap }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.webapp-name }}
          slot-name: staging
          package: ./publish

      - name: Smoke test staging slot
        if: ${{ inputs.slot-swap }}
        env:
          URL: https://${{ inputs.webapp-name }}-staging.azurewebsites.net
        run: |
          for i in $(seq 1 12); do
            BODY=$(curl -fsS --max-time 10 "$URL/v1/hello" || true)
            if [ "$BODY" = "Hello World!" ]; then
              echo "Slot healthy: $URL"
              exit 0
            fi
            echo "Attempt $i: slot not ready yet"
            sleep 10
          done
          echo "::error::Staging slot failed smoke test — aborting before swap. Production is untouched."
          exit 1

      - name: Swap staging slot into production
        if: ${{ inputs.slot-swap }}
        run: >
          az webapp deployment slot swap
          --resource-group ${{ inputs.environment }}-demo-helloworld-rg
          --name ${{ inputs.webapp-name }}
          --slot staging
          --target-slot production

      - name: Smoke test deployment
        env:
          URL: https://${{ inputs.webapp-name }}.azurewebsites.net
        run: |
          for i in $(seq 1 12); do
            BODY=$(curl -fsS --max-time 10 "$URL/v1/hello" || true)
            if [ "$BODY" = "Hello World!" ]; then
              echo "Deployment healthy: $URL"
              exit 0
            fi
            echo "Attempt $i: app not ready yet"
            sleep 10
          done
          echo "::error::Deployment failed smoke test at $URL"
          exit 1

      - name: Output deployment URL
        env:
          URL: https://${{ inputs.webapp-name }}.azurewebsites.net
        run: |
          echo "Deployed ${{ inputs.build-label }} to ${{ inputs.environment }}: $URL"
          {
            echo "### 🚀 Deployed \`${{ inputs.build-label }}\` to **${{ inputs.environment }}**${{ inputs.slot-swap && ' (slot swap)' || '' }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| App | $URL |"
            echo "| Swagger | $URL/swagger |"
            echo "| API | $URL/v1/hello |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tag deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/build/${{ inputs.environment }}/${{ inputs.build-label }}`,
              sha: context.sha
            })
