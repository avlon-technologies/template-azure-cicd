name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: >
          GitHub environment name (dev | stg | prod). The App Service name,
          resource group, and OIDC client ID come from that environment's
          variables (WEBAPP_NAME, RESOURCE_GROUP, AZURE_CLIENT_ID) — the job's
          `environment:` declaration scopes the vars context to it.
        type: string
        required: true
      build-label:
        description: >
          Build label (e.g. YYYYMMDD.run_number) shown in the run summary,
          asserted by the smoke tests, and used for the deployment tag when
          tag-deployment is set.
        type: string
        required: true
      slot-swap:
        description: Deploy to the staging slot, smoke test, then swap (requires a Standard+ plan with a "staging" slot)
        type: boolean
        required: false
        default: false
      artifact-name:
        description: Publish artifact to deploy
        type: string
        required: false
        default: 'webapp-publish'
      artifact-run-id:
        description: >
          Workflow run to take the artifact from. Empty = this run. Set for
          build-once promotion (deploy the stg-tested artifact, no rebuild).
        type: string
        required: false
        default: ''
      source-sha:
        description: >
          Commit the deployed artifact was built from. Empty = this run's HEAD.
          Set on the prod promotion/rollback path so the deployment tag points
          at the release-branch commit that produced the artifact, not the
          merge commit or current main HEAD.
        type: string
        required: false
        default: ''
      tag-deployment:
        description: >
          Tag the deployed commit build/<environment>/<build-label> after a
          successful deploy. stg/prod callers set this — stg tags are the
          promotion gate's proof of a green staging deploy and the QA/UAT
          audit trail; prod tags are the release audit trail. Dev deploys are
          not tagged (the Deployments view and run history are the record).
        type: boolean
        required: false
        default: false
      runner-labels:
        description: >
          JSON array of runner labels the deploy job requires. The default
          matches any self-hosted runner. Once more than one runner exists,
          give each environment's runner a distinct label and pin it here
          (e.g. '["self-hosted", "prod-deploy"]') so prod deploys only run
          on isolated prod runners — see getting-started's runner section.
        type: string
        required: false
        default: '["self-hosted"]'

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    # Self-hosted: the App Service deploy surfaces are IP-allowlisted
    # (deploy_ingress_cidrs in the infrastructure repo, ADR-0005/0006), so
    # deploys must egress from the allowlisted self-hosted runner —
    # GitHub-hosted runners get 403s once the allowlist is on.
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    environment: ${{ inputs.environment }}
    # A hung deploy or swap must not hold the environment's concurrency
    # group (and the shared runner) for GitHub's 6-hour default.
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      # download-artifact with an explicit run-id + github-token reads via the
      # REST API, which needs actions: read (the promotion path pulls the
      # artifact from a different run). Callers must grant this too.
      actions: read

    steps:
      - name: Clean workspace
        # Self-hosted runners reuse their working directory between jobs.
        # download-artifact does not empty its target, so a leftover
        # ./publish from a previous deploy would merge into this one's
        # package — files deleted upstream would resurrect. Start empty.
        run: rm -rf ./publish

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ./publish
          run-id: ${{ inputs.artifact-run-id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Verify artifact integrity and provenance
        # Defense-in-depth behind the promotion-time provenance check
        # (find-verified-artifact.sh): prove the *bytes on this runner* are
        # the bytes _build.yml produced. The manifest's attestation is
        # GitHub-signed and pinned to this repo's _build.yml, so a swapped
        # or tampered artifact fails either the attestation verify or the
        # re-hash. No silent fallback: an artifact without an attested
        # manifest (built before attestations) must be re-staged —
        # re-dispatch its source pipeline to build a fresh candidate.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f publish/SHA256SUMS ]; then
            echo "::error::Artifact has no SHA256SUMS manifest (built before attestations were introduced, or stripped). Re-dispatch the source pipeline to produce a fresh, attested artifact."
            exit 1
          fi
          gh attestation verify publish/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/_build.yml"
          (cd publish && sha256sum --check --quiet SHA256SUMS)
          EXTRA=$(cd publish && comm -13 \
            <(awk '{ $1=""; sub(/^ +/, ""); print }' SHA256SUMS | sort) \
            <(find . -type f ! -name SHA256SUMS | sort))
          if [ -n "$EXTRA" ]; then
            echo "::error::Artifact contains files not covered by the attested manifest:"
            echo "$EXTRA"
            exit 1
          fi
          echo "Artifact verified: manifest attested by _build.yml, all file hashes match, no uncovered files."

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        if: ${{ !inputs.slot-swap }}
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3.0.8
        with:
          app-name: ${{ vars.WEBAPP_NAME }}
          package: ./publish

      - name: Deploy to staging slot
        if: ${{ inputs.slot-swap }}
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3.0.8
        with:
          app-name: ${{ vars.WEBAPP_NAME }}
          slot-name: staging
          package: ./publish

      - name: Smoke test staging slot
        if: ${{ inputs.slot-swap }}
        env:
          URL: https://${{ vars.WEBAPP_NAME }}-staging.azurewebsites.net
          EXPECTED: ${{ inputs.build-label }}
        run: |
          # Healthy = answers correctly AND reports the intended build. The
          # version check treats a mismatch as "not ready" (the old build may
          # still be serving while the new one warms up) and only fails when
          # the loop times out. Promoted binaries keep their rc stamp, so the
          # exact label or a pre-release of it (1.6.0 ← 1.6.0-rc.3) passes.
          DEPLOYED=""
          for i in $(seq 1 12); do
            BODY=$(curl -fsS --max-time 10 "$URL/v1/hello" || true)
            if [ "$BODY" = "Hello World!" ]; then
              DEPLOYED=$(curl -fsS --max-time 10 "$URL/openapi/v1.json" | jq -r '.info.version // empty' || true)
              if [ "$DEPLOYED" = "$EXPECTED" ] || [[ "$DEPLOYED" == "$EXPECTED"-* ]]; then
                echo "Slot healthy: $URL is serving build $DEPLOYED"
                exit 0
              fi
              echo "Attempt $i: slot answering but reports version '${DEPLOYED:-<none>}', want '$EXPECTED'"
            else
              echo "Attempt $i: slot not ready yet"
            fi
            sleep 10
          done
          echo "::error::Staging slot failed smoke test (last version seen: '${DEPLOYED:-<none>}', expected '$EXPECTED') — aborting before swap. Production is untouched."
          exit 1

      - name: Swap staging slot into production
        id: swap
        if: ${{ inputs.slot-swap }}
        run: >
          az webapp deployment slot swap
          --resource-group ${{ vars.RESOURCE_GROUP }}
          --name ${{ vars.WEBAPP_NAME }}
          --slot staging
          --target-slot production

      - name: Smoke test deployment
        env:
          # Through the gateway when the environment defines GATEWAY_URL —
          # the app's main site only admits the gateway's IP (ADR-0005), so
          # its own hostname 403s everyone including this runner. Falls back
          # to the app hostname for environments without the lockdown.
          URL: ${{ vars.GATEWAY_URL || format('https://{0}.azurewebsites.net', vars.WEBAPP_NAME) }}
          EXPECTED: ${{ inputs.build-label }}
        run: |
          # Same contract as the slot smoke test: right answer AND right
          # build. Catches a swap that silently didn't take effect as well as
          # a deploy that shipped the wrong artifact.
          DEPLOYED=""
          for i in $(seq 1 12); do
            BODY=$(curl -fsS --max-time 10 "$URL/v1/hello" || true)
            if [ "$BODY" = "Hello World!" ]; then
              DEPLOYED=$(curl -fsS --max-time 10 "$URL/openapi/v1.json" | jq -r '.info.version // empty' || true)
              if [ "$DEPLOYED" = "$EXPECTED" ] || [[ "$DEPLOYED" == "$EXPECTED"-* ]]; then
                echo "Deployment healthy: $URL is serving build $DEPLOYED"
                exit 0
              fi
              echo "Attempt $i: app answering but reports version '${DEPLOYED:-<none>}', want '$EXPECTED'"
            else
              echo "Attempt $i: app not ready yet"
            fi
            sleep 10
          done
          echo "::error::Deployment failed smoke test at $URL (last version seen: '${DEPLOYED:-<none>}', expected '$EXPECTED')"
          exit 1

      - name: Swap back after failed post-swap smoke test
        # steps.swap.outcome == 'success' means the swap actually ran — a
        # pre-swap failure (bad build caught in the slot) must NOT swap, and a
        # non-slot deploy has nothing to swap back to. The job still fails;
        # this only restores the previous production build.
        if: ${{ failure() && steps.swap.outcome == 'success' }}
        run: |
          echo "::error::Post-swap smoke test failed — swapping the previous build back into production."
          az webapp deployment slot swap \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.WEBAPP_NAME }} \
            --slot staging \
            --target-slot production

      - name: Output deployment URL
        env:
          URL: ${{ vars.GATEWAY_URL || format('https://{0}.azurewebsites.net', vars.WEBAPP_NAME) }}
        run: |
          echo "Deployed ${{ inputs.build-label }} to ${{ inputs.environment }}: $URL"
          {
            echo "### 🚀 Deployed \`${{ inputs.build-label }}\` to **${{ inputs.environment }}**${{ inputs.slot-swap && ' (slot swap)' || '' }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| App | $URL |"
            echo "| Swagger | $URL/swagger |"
            echo "| API | $URL/v1/hello |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tag deployment
        if: ${{ inputs.tag-deployment }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SOURCE_SHA: ${{ inputs.source-sha }}
          # Via env, not interpolated into the script source — a label can't
          # inject JS even if upstream validation is ever loosened.
          TAG_REF: refs/tags/build/${{ inputs.environment }}/${{ inputs.build-label }}
        with:
          script: |
            // Tag the commit the artifact was built from — on the prod
            // promotion/rollback path that is the release branch head, not
            // this run's HEAD.
            const sha = process.env.SOURCE_SHA || context.sha;
            const tagRef = process.env.TAG_REF;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: tagRef,
                sha
              });
            } catch (err) {
              if (err.status !== 422) throw err;
              const existing = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: tagRef.replace('refs/', '')
              });
              if (existing.data.object.sha === sha) {
                core.info(`Tag already points at ${sha} — nothing to do.`);
              } else {
                core.setFailed(`${tagRef} already points at ${existing.data.object.sha} but this deploy is ${sha}. Deployment tags are immutable — use a new label.`);
              }
            }

      - name: Notify deploy failure
        # Opt-in push notification: set DEPLOY_ALERT_WEBHOOK (environment or
        # repo variable) to a chat webhook accepting a {"text": ...} payload
        # (Slack/Teams-style). Without it a failed deploy — including an
        # executed auto-swap-back, which is a prod incident — is visible
        # only to whoever watches the Actions tab.
        # cancelled() is load-bearing: a job killed by timeout-minutes (the
        # hung-deploy case) reports *cancelled*, not failed — failure()
        # alone would skip the alert in exactly the scenario the timeout
        # exists for. GitHub still runs condition-matching steps during
        # cancellation teardown. Manual cancellations alert too, which is
        # correct for a deploy job (concurrency never auto-cancels these).
        if: ${{ (failure() || cancelled()) && vars.DEPLOY_ALERT_WEBHOOK != '' }}
        env:
          WEBHOOK: ${{ vars.DEPLOY_ALERT_WEBHOOK }}
          ENVIRONMENT: ${{ inputs.environment }}
          BUILD_LABEL: ${{ inputs.build-label }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n --arg text "🚨 Deploy of $BUILD_LABEL to $ENVIRONMENT did not succeed (status: $STATUS): $RUN_URL" '{text: $text}' \
            | curl -fsS --max-time 10 -H 'Content-Type: application/json' -d @- "$WEBHOOK" \
            || echo "::warning::Could not deliver the failure notification to DEPLOY_ALERT_WEBHOOK."
