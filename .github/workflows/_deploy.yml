name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name (dev | stg | prod)
        type: string
        required: true
      webapp-name:
        description: Azure App Service name to deploy to
        type: string
        required: true
      azure-client-id:
        description: App Registration client ID for OIDC login
        type: string
        required: true
      build-label:
        description: Build label (YYYYMMDD.run_number) used to tag the deployment commit
        type: string
        required: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-publish
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.azure-client-id }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.webapp-name }}
          package: ./publish

      - name: Output deployment URL
        env:
          URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          echo "Deployed ${{ inputs.build-label }} to ${{ inputs.environment }}: $URL"
          {
            echo "### 🚀 Deployed \`${{ inputs.build-label }}\` to **${{ inputs.environment }}**"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| App | $URL |"
            echo "| Swagger | $URL/swagger |"
            echo "| API | $URL/v1/hello |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tag deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/build/${{ inputs.environment }}/${{ inputs.build-label }}`,
              sha: context.sha
            })
