name: CI/CD — Develop → DEV

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build.yml

  deploy:
    needs: build
    # Callers must grant what the reusable workflow's job requests — the repo
    # default token is read-only and called workflows cannot elevate it.
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: dev
      webapp-name: dev-demo-helloworld-api
      azure-client-id: 3d291ad9-9d36-4f52-be2c-6b385a085ffb
      build-label: ${{ needs.build.outputs.build-label }}
