name: Image

# Packages the tested publish output as a container image in the shared
# registry (az acr build — the build runs in ACR Tasks, no Docker on the
# runner; ADR-0006/0008 in the infrastructure repo). The image is the
# promotable unit: it is built once per commit, tagged sha-<sha> and
# <build-label>, and every deploy pins its immutable digest. Promotable
# builds also upload a digest marker artifact
# (<artifact-name>.image.<digest-hex>) so later dispatches and the prod
# promotion can resolve the digest without touching the registry.

on:
  workflow_call:
    inputs:
      environment:
        description: >
          GitHub environment whose deploy identity runs az acr build (it
          holds Container Registry Tasks Contributor + AcrPull on the
          shared registry). dev builds use dev; release/hotfix/support
          builds use stg; the prod rebuild escape hatch uses prod (and so
          passes the prod approval gate before building).
        type: string
        required: true
      build-label:
        description: Build label the image is tagged with (alongside sha-<sha>)
        type: string
        required: true
      image-repository:
        description: >
          Registry repository the image is pushed to and attested under
          (e.g. cicd-demo/api). The digest marker, the deploy-time
          attestation subject, and _deploy.yml's verify step all key off
          this. Required and never defaulted: callers thread it from the
          IMAGE_REPOSITORY repo variable, and an empty value fails the build
          (see the "Build and push image" guard) rather than silently
          shipping an unintended repository.
        type: string
        required: true
      artifact-name:
        description: >
          Publish artifact (from _build.yml, same run) to package. Also
          prefixes the digest marker for promotable builds.
        type: string
        required: false
        default: 'webapp-publish'
      retention-days:
        description: Digest-marker retention (promotable builds keep 90 days)
        type: number
        required: false
        default: 1
    outputs:
      image-digest:
        description: Immutable image digest (sha256:<hex>) deploys must pin
        value: ${{ jobs.image.outputs.image-digest }}

jobs:
  image:
    name: Build image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      attestations: write
    outputs:
      image-digest: ${{ steps.digest.outputs.value }}

    steps:
      # For the Dockerfile only — the app content comes from the tested
      # publish artifact, never from a source rebuild.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download publish artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ./publish

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image (az acr build)
        env:
          ACR: ${{ vars.ACR_NAME }}
          REPO: ${{ inputs.image-repository }}
          LABEL: ${{ inputs.build-label }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$REPO" ]; then
            echo "::error::image-repository is empty — set the IMAGE_REPOSITORY repository variable. Refusing to build with an unqualified image name."
            exit 1
          fi
          # Minimal context: the Dockerfile plus the tested publish output.
          mkdir -p "$RUNNER_TEMP/ctx"
          cp Dockerfile "$RUNNER_TEMP/ctx/"
          cp -r publish "$RUNNER_TEMP/ctx/publish"
          az acr build --registry "$ACR" \
            --image "$REPO:sha-$SHA" \
            --image "$REPO:$LABEL" \
            "$RUNNER_TEMP/ctx"

      - name: Resolve image digest
        id: digest
        env:
          ACR: ${{ vars.ACR_NAME }}
          REPO: ${{ inputs.image-repository }}
          SHA: ${{ github.sha }}
        run: |
          # az acr repository show --image returns the tag's attributes
          # (its `az acr manifest show` cousin returns the raw manifest,
          # which has no digest field — and is a preview command besides).
          DIGEST=$(az acr repository show --name "$ACR" --image "$REPO:sha-$SHA" --query digest -o tsv)
          if [ -z "$DIGEST" ]; then
            echo "::error::Could not resolve the digest for $REPO:sha-$SHA — the acr build did not push?"
            exit 1
          fi
          echo "Image digest: $DIGEST"
          echo "value=$DIGEST" >> "$GITHUB_OUTPUT"
          # Artifact names cannot contain ':' — the marker carries the bare
          # hex; consumers re-prefix sha256:.
          echo "hex=${DIGEST#sha256:}" >> "$GITHUB_OUTPUT"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.image-repository }}
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: false

      - name: Write digest marker
        # Companion to commit-keyed (promotable) artifacts, mirroring the
        # label marker from _build.yml: an artifact whose NAME records the
        # digest (<artifact-name>.image.<hex>), so stg dispatch reuse and
        # prod promotion resolve the digest via the (provenance-verified)
        # producing run without registry access.
        if: inputs.artifact-name != 'webapp-publish'
        env:
          DIGEST: ${{ steps.digest.outputs.value }}
        run: printf '%s\n' "$DIGEST" > "$RUNNER_TEMP/image-digest-marker"

      - name: Upload digest marker
        if: inputs.artifact-name != 'webapp-publish'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}.image.${{ steps.digest.outputs.hex }}
          path: ${{ runner.temp }}/image-digest-marker
          retention-days: ${{ inputs.retention-days }}
