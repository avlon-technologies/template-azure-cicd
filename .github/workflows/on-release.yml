name: CI/CD — Release → STG

on:
  push:
    branches:
      - release/**
      - milestone/**
  # No inputs: the build label is a pure function of the commit (branch name
  # + commit height), so there is nothing for the operator to choose — a
  # dispatch means "deploy this branch's HEAD to stg".
  workflow_dispatch:

# Dispatches deploy to stg — serialize them with the other stg pipelines
# (hotfix/support share the group). Pushes only build, so they queue per
# branch instead of blocking each other across branches.
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'deploy-stg' || format('build-{0}', github.ref) }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      # When an existing artifact is reused, its stamped label (from the
      # promote step) wins over the freshly derived one — the binary is the
      # source of truth for what it reports.
      version: ${{ steps.promote.outputs.version || steps.version.outputs.value }}
      promote-artifact: ${{ steps.promote.outputs.artifact }}
      promote-run-id: ${{ steps.promote.outputs.run-id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the label embeds the commit height
          # (git rev-list --count), which a shallow clone would report as 1.
          fetch-depth: 0

      - name: Derive version from the commit
        id: version
        # The label is deterministic — branch name + commit height — so every
        # build of the same commit produces the same label, and the push
        # build's artifact is reusable when the deploy is dispatched later.
        env:
          REF: ${{ github.ref_name }}
        run: |
          # The dispatch form's branch selector defaults to the repo's default
          # branch (develop) — reject anything that isn't actually a release
          # or milestone branch before touching version logic, so a mis-set
          # selector fails fast instead of building/deploying the wrong ref.
          if [[ "$REF" == release/* ]]; then
            BRANCH_KIND=release
            BRANCH_VERSION="${REF#release/}"
          elif [[ "$REF" == milestone/* ]]; then
            BRANCH_KIND=milestone
            BRANCH_VERSION="${REF#milestone/}"
          else
            echo "::error::This workflow must be run from a release/* or milestone/* branch, not '$REF'. Check the 'Use workflow from' branch selector on the dispatch form — it defaults to the repository's default branch."
            exit 1
          fi

          HEIGHT=$(git rev-list --count HEAD)
          if [ "$BRANCH_KIND" = release ]; then
            VALUE="$BRANCH_VERSION-build.$HEIGHT"
          else
            VALUE="ms-$BRANCH_VERSION.$HEIGHT"
          fi
          # Labels become artifact/marker names and git tags — restrict to a
          # safe charset. The auto-generated label inherits the branch name,
          # which can carry characters artifact names reject; checked on
          # every event because push builds now upload marker artifacts too.
          if [[ ! "$VALUE" =~ ^[0-9A-Za-z.-]+$ ]]; then
            echo "::error::Label '$VALUE' contains unsupported characters (allowed: letters, digits, '.', '-'). Rename the branch."
            exit 1
          fi
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

      - name: Locate existing rc artifact
        id: promote
        # Reuse the artifact the push build already produced for this commit
        # rather than rebuilding: labels are commit-derived, so the push
        # build was stamped with the same label this dispatch resolved. If
        # the marker disagrees (the derivation changed between push and
        # dispatch), the existing stamp wins — the version is compiled into
        # the binary, and re-labeling would ship an app that reports the
        # wrong version.
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          DERIVED: ${{ steps.version.outputs.value }}
        run: |
          NAME="webapp-$GITHUB_SHA"
          RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?name=$NAME" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "No existing artifact for $GITHUB_SHA (push build expired or predates this commit) — will build."
            exit 0
          fi
          # The build uploads a marker artifact whose name carries the label
          # the binary was stamped with: <artifact-name>.label.<label>.
          EXISTING_LABEL=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts?per_page=100" \
            --jq ".artifacts[].name | select(startswith(\"$NAME.label.\"))" | head -1)
          EXISTING_LABEL="${EXISTING_LABEL#"$NAME.label."}"
          if [ -z "$EXISTING_LABEL" ]; then
            echo "Artifact $NAME exists but carries no label marker (built before markers were introduced) — rebuilding."
            exit 0
          fi
          if [ "$EXISTING_LABEL" != "$DERIVED" ]; then
            echo "::notice::Existing artifact is stamped '$EXISTING_LABEL' (derived '$DERIVED' — label derivation changed since the push build). Deploying the binary as what it actually reports."
          fi
          echo "Reusing existing artifact $NAME (label '$EXISTING_LABEL') from run $RUN_ID — build will be skipped."
          echo "artifact=$NAME" >> $GITHUB_OUTPUT
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "version=$EXISTING_LABEL" >> $GITHUB_OUTPUT

  build:
    if: needs.prepare.outputs.promote-run-id == ''
    needs: prepare
    permissions:
      contents: read
      checks: write
      pull-requests: write
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      # Every build on a release/milestone branch is promotable: labels are
      # commit-derived, so the push build already carries the label a later
      # dispatch will resolve. Commit-keyed name, 90-day retention.
      artifact-name: webapp-${{ github.sha }}
      retention-days: 90

  deploy:
    # Only deploy when the release coordinator manually dispatches — not on every push.
    # !failure() && !cancelled() instead of implicit success(): success() is false when
    # ANY ancestor job was skipped, and on the promotion path the build job is skipped.
    if: ${{ !failure() && !cancelled() && github.event_name == 'workflow_dispatch' }}
    needs: [prepare, build]
    # Callers must grant what the reusable workflow's job requests — the repo
    # default token is read-only and called workflows cannot elevate it.
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: stg
      build-label: ${{ needs.prepare.outputs.promote-run-id != '' && needs.prepare.outputs.version || needs.build.outputs.build-label }}
      artifact-name: webapp-${{ github.sha }}
      artifact-run-id: ${{ needs.prepare.outputs.promote-run-id }}
      # stg tags are the prod promotion gate's proof of a green staging
      # deploy and the QA/UAT audit trail.
      tag-deployment: true
