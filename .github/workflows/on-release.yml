name: CI/CD — Release → STG

on:
  push:
    branches:
      - release/**
      - milestone/**
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version label (e.g. 1.1.0-rc.1). Leave empty to reuse the label this commit was already built with, or auto-generate one.'
        required: false
        type: string

# Dispatches deploy to stg — serialize them with the other stg pipelines
# (hotfix/support share the group). Pushes only build, so they queue per
# branch instead of blocking each other across branches.
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'deploy-stg' || format('build-{0}', github.ref) }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      # When an existing artifact is reused, its stamped label (from the
      # promote step) wins over the resolved input/auto label.
      version: ${{ steps.promote.outputs.version || steps.version.outputs.value }}
      promote-artifact: ${{ steps.promote.outputs.artifact }}
      promote-run-id: ${{ steps.promote.outputs.run-id }}
    steps:
      - name: Resolve and validate version
        id: version
        # Inputs pass via env, never interpolated into the script.
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
          EVENT: ${{ github.event_name }}
        run: |
          # The dispatch form's branch selector defaults to the repo's default
          # branch (develop) — reject anything that isn't actually a release
          # or milestone branch before touching version logic, so a mis-set
          # selector fails fast instead of building/deploying the wrong ref.
          if [[ "$REF" == release/* ]]; then
            BRANCH_KIND=release
            BRANCH_VERSION="${REF#release/}"
          elif [[ "$REF" == milestone/* ]]; then
            BRANCH_KIND=milestone
            BRANCH_VERSION="${REF#milestone/}"
          else
            echo "::error::This workflow must be run from a release/* or milestone/* branch, not '$REF'. Check the 'Use workflow from' branch selector on the dispatch form — it defaults to the repository's default branch."
            exit 1
          fi

          if [ -n "$INPUT_VERSION" ]; then
            # Dispatched: the label must belong to the release branch it runs
            # from, so staging can't be stamped/tagged with a foreign version.
            if [[ "$INPUT_VERSION" != "$BRANCH_VERSION" && "$INPUT_VERSION" != "$BRANCH_VERSION"-* ]]; then
              echo "::error::Version label '$INPUT_VERSION' does not match branch '$REF' (expected '$BRANCH_VERSION' or '$BRANCH_VERSION-<pre-release>', e.g. '$BRANCH_VERSION-rc.1')."
              exit 1
            fi
            VALUE="$INPUT_VERSION"
          elif [ "$BRANCH_KIND" = release ]; then
            VALUE="$BRANCH_VERSION-build.$RUN_NUMBER"
          else
            VALUE="ms-$BRANCH_VERSION.$RUN_NUMBER"
          fi
          # Dispatch labels become artifact/marker names and git tags —
          # restrict to a safe charset. Checked on the RESOLVED value, not
          # just the input: the auto-generated label inherits the branch
          # name, which can carry characters artifact names reject.
          if [ "$EVENT" = "workflow_dispatch" ] && [[ ! "$VALUE" =~ ^[0-9A-Za-z.-]+$ ]]; then
            echo "::error::Label '$VALUE' contains unsupported characters (allowed: letters, digits, '.', '-'). Supply a valid version input, or rename the branch."
            exit 1
          fi
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

      - name: Locate existing rc artifact
        id: promote
        # On repeated dispatches, reuse the artifact already built for this
        # commit rather than rebuilding. The version stamp is compiled into
        # the binary at build time, so reuse is only valid for the label it
        # was built with — a mismatched label fails HERE, before anything
        # deploys, instead of at the post-deploy smoke test. An empty version
        # input adopts the existing label (intuitive redeploy: just hit Run).
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          NAME="webapp-$GITHUB_SHA"
          RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?name=$NAME" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "No existing artifact for $GITHUB_SHA — will build."
            exit 0
          fi
          # The build uploads a marker artifact whose name carries the label
          # the binary was stamped with: <artifact-name>.label.<label>.
          EXISTING_LABEL=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts?per_page=100" \
            --jq ".artifacts[].name | select(startswith(\"$NAME.label.\"))" | head -1)
          EXISTING_LABEL="${EXISTING_LABEL#"$NAME.label."}"
          if [ -z "$EXISTING_LABEL" ]; then
            echo "Artifact $NAME exists but carries no label marker (built before markers were introduced) — rebuilding with the requested label."
            exit 0
          fi
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "$EXISTING_LABEL" ]; then
            echo "::error::This commit was already built and stamped as '$EXISTING_LABEL' — deploying that binary as '$INPUT_VERSION' would ship an app that reports the wrong version. Re-dispatch with '$EXISTING_LABEL' (or leave the version empty to reuse it), or push a new commit to build '$INPUT_VERSION'."
            exit 1
          fi
          echo "Reusing existing artifact $NAME (label '$EXISTING_LABEL') from run $RUN_ID — build will be skipped."
          echo "artifact=$NAME" >> $GITHUB_OUTPUT
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "version=$EXISTING_LABEL" >> $GITHUB_OUTPUT

  build:
    if: needs.prepare.outputs.promote-run-id == ''
    needs: prepare
    permissions:
      contents: read
      checks: write
      pull-requests: write
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      # Dispatched rc builds are promotable: commit-keyed name, 90-day
      # retention, so the prod deploy can ship this exact artifact.
      artifact-name: ${{ github.event_name == 'workflow_dispatch' && format('webapp-{0}', github.sha) || 'webapp-publish' }}
      retention-days: ${{ github.event_name == 'workflow_dispatch' && 90 || 1 }}

  deploy:
    # Only deploy when the release coordinator manually dispatches — not on every push.
    # !failure() && !cancelled() instead of implicit success(): success() is false when
    # ANY ancestor job was skipped, and on the promotion path the build job is skipped.
    if: ${{ !failure() && !cancelled() && github.event_name == 'workflow_dispatch' }}
    needs: [prepare, build]
    # Callers must grant what the reusable workflow's job requests — the repo
    # default token is read-only and called workflows cannot elevate it.
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: stg
      build-label: ${{ needs.prepare.outputs.promote-run-id != '' && needs.prepare.outputs.version || needs.build.outputs.build-label }}
      artifact-name: webapp-${{ github.sha }}
      artifact-run-id: ${{ needs.prepare.outputs.promote-run-id }}
      # stg tags are the prod promotion gate's proof of a green staging
      # deploy and the QA/UAT audit trail.
      tag-deployment: true
