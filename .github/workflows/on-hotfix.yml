name: CI/CD — Hotfix → STG

on:
  push:
    branches:
      - hotfix/**
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.4.1-rc.1)'
        required: true
        type: string

jobs:
  pipeline:
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_hotfix-support.yml
    with:
      branch-type: hotfix
      version: ${{ inputs.version || '' }}
      event-name: ${{ github.event_name }}
      ref-name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      run-number: ${{ github.run_number }}
