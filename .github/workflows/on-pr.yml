name: PR Validation

# Builds and tests every PR targeting develop or main. The "build / Build &
# Test" check is required by the branch rulesets before merging.

on:
  pull_request:
    branches:
      - develop
      - main

# A new push to the PR supersedes the running build — cancel it.
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    uses: ./.github/workflows/_build.yml

  lint-workflows:
    name: Lint workflows
    # actionlint statically validates every workflow: expression types,
    # job/step wiring, runner labels, action inputs — and shellcheck on
    # every run: block (shellcheck is preinstalled on ubuntu-latest).
    # Pinned by version AND checksum: this runs before any review gate,
    # so it gets the same supply-chain treatment as an action pin.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run actionlint
        env:
          # Warning severity and above; SC2154 excluded (step env vars are
          # assigned by the workflow `env:` blocks shellcheck can't see).
          SHELLCHECK_OPTS: -S warning -e SC2154
        run: |
          curl -fsSL -o /tmp/actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  /tmp/actionlint.tar.gz" | sha256sum -c
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint -color

  workflow-scripts:
    name: Test workflow scripts
    # Regression tests for the bash the workflows source — most importantly
    # the artifact provenance check (the promotion path's security control).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run workflow-script tests
        # Every .github/scripts/*.test.sh: provenance check, marker
        # parsing, and the _deploy.yml step scripts (extracted from the
        # workflow YAML at test time, so coverage can't drift from the
        # real code).
        run: |
          FAILED=0
          for t in .github/scripts/*.test.sh; do
            echo "=== $t"
            bash "$t" || FAILED=1
          done
          exit $FAILED

  format:
    name: Verify formatting
    # dotnet format as a gate keeps style drift out of review diffs. Fix
    # failures locally with: dotnet format cicd-demo.sln
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.x'
      - name: Check formatting
        run: dotnet format cicd-demo.sln --verify-no-changes

  guard-main-source:
    name: Guard main source branch
    # main receives code only through release/* or hotfix/* branches — features
    # flow via develop and reach prod through a release. Required check on main.
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce release, hotfix, or support source
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # The prefix alone is not enough: the prod pipeline parses X.Y.Z
          # from the merge commit subject, so a branch like release/1.2
          # would merge cleanly and then fail the prod run. Enforce the
          # full shape here, before the merge.
          if [[ "$HEAD_REF" =~ ^(release|hotfix|support)/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Source branch '$HEAD_REF' is allowed into main."
          elif [[ "$HEAD_REF" == release/* || "$HEAD_REF" == hotfix/* || "$HEAD_REF" == support/* ]]; then
            echo "::error::Branch '$HEAD_REF' has the right prefix but not an X.Y.Z version — the prod pipeline can only promote semantic versions (e.g. release/1.2.0). Rename the branch and open a new PR."
            exit 1
          else
            echo "::error::PRs into main must come from a release/*, hotfix/*, or support/* branch, not '$HEAD_REF'. Merge to develop and cut a release instead."
            exit 1
          fi
