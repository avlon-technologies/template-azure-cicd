name: CI/CD — Main → PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to redeploy to prod (e.g. 1.6.0). Leave empty to redeploy current main.'
        required: false
        type: string

# Serialize prod deploys — overlapping runs would race the slot swap. Queued
# runs wait; only the newest queued run is kept (superseded ones are dropped).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      source-branch: ${{ steps.version.outputs.branch }}
      promote-artifact: ${{ steps.promote.outputs.artifact }}
      promote-run-id: ${{ steps.promote.outputs.run-id }}
      promote-sha: ${{ steps.promote.outputs.sha }}
    steps:
      - name: Extract version from merge commit
        id: version
        # Push: parse the merge commit subject for a release/hotfix/support branch name.
        # Dispatch with version: use the supplied version directly (rollback path).
        # Dispatch without version: no version → _build.yml falls back to date label.
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "value=$INPUT_VERSION" >> $GITHUB_OUTPUT
            echo "branch=" >> $GITHUB_OUTPUT
            echo "Rollback dispatch: targeting version $INPUT_VERSION"
          else
            BRANCH=$(echo "$COMMIT_MESSAGE" | head -1 | grep -oE '(release|hotfix|support)/[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            VERSION="${BRANCH#*/}"
            echo "value=$VERSION" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "Resolved version: '${VERSION:-<none, using date label>}' (source branch: '${BRANCH:-<none>}')"
          fi

      - name: Locate promotable release artifact
        id: promote
        if: steps.version.outputs.value != ''
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            # Rollback path: resolve the merge commit SHA from the v<version> release tag,
            # then walk to its second parent (the release branch head) to find the artifact.
            MERGE_SHA=$(gh api "repos/$GITHUB_REPOSITORY/commits/v$INPUT_VERSION" \
              --jq '.sha' 2>/dev/null || true)
            if [ -z "$MERGE_SHA" ]; then
              echo "::error::Tag v$INPUT_VERSION not found. Verify the version exists on the Releases page."
              exit 1
            fi
            RELEASE_SHA=$(gh api "repos/$GITHUB_REPOSITORY/commits/$MERGE_SHA" \
              --jq '.parents[1].sha // empty')
          else
            # Normal push path: the release branch head is the merge commit's second parent.
            RELEASE_SHA=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA" \
              --jq '.parents[1].sha // empty')
          fi

          # A resolved version with no locatable artifact is a hard error, not
          # a rebuild: prod ships only binaries staging has tested, and a
          # silent rebuild here would break that guarantee.
          if [ -z "$RELEASE_SHA" ]; then
            echo "::error::v$VERSION does not resolve to a merge commit, so its stg-tested artifact cannot be located (was the PR squash-merged?). Refusing to rebuild for prod."
            exit 1
          fi

          # "Artifact exists" is not "staging tested it" — the artifact is
          # uploaded at build time, before the stg deploy. A build/stg/* tag
          # is created only after a stg deploy passes its smoke test, so
          # require one on the release commit before promoting.
          STG_TAG=$(gh api --paginate "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/build/stg/" \
            --jq ".[] | select(.object.sha == \"$RELEASE_SHA\") | .ref" | head -1)
          if [ -z "$STG_TAG" ]; then
            echo "::error::No build/stg/* tag points at $RELEASE_SHA — this build was never successfully deployed to staging. Dispatch the release/hotfix/support pipeline on the source branch, verify staging, then re-run this workflow."
            exit 1
          fi
          echo "Staging verified: $STG_TAG points at $RELEASE_SHA."

          NAME="webapp-$RELEASE_SHA"
          RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?name=$NAME" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // empty')
          if [ -n "$RUN_ID" ]; then
            echo "Promoting artifact $NAME from run $RUN_ID — build will be skipped."
            echo "artifact=$NAME" >> $GITHUB_OUTPUT
            echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
            echo "sha=$RELEASE_SHA" >> $GITHUB_OUTPUT
          else
            echo "::error::No unexpired stg-tested artifact for $RELEASE_SHA — no rc was dispatched for v$VERSION, or it passed the 90-day retention window. Dispatch the release/hotfix/support pipeline on the source branch (e.g. gh workflow run on-release.yml --ref release/$VERSION -f version=$VERSION-rc.1), verify staging, then re-run this workflow."
            exit 1
          fi

  build:
    # Skipped when a stg-tested artifact is being promoted.
    if: needs.prepare.outputs.promote-run-id == ''
    needs: prepare
    permissions:
      contents: read
      checks: write
      pull-requests: write
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  deploy:
    needs: [prepare, build]
    # Run even when build was skipped (promotion path).
    if: ${{ !failure() && !cancelled() }}
    # Callers must grant what the reusable workflow's job requests — the repo
    # default token is read-only and called workflows cannot elevate it.
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      build-label: ${{ needs.prepare.outputs.promote-run-id != '' && needs.prepare.outputs.version || needs.build.outputs.build-label }}
      # Blue/green: deploy to the staging slot, smoke test, then swap.
      slot-swap: true
      artifact-name: ${{ needs.prepare.outputs.promote-artifact || 'webapp-publish' }}
      artifact-run-id: ${{ needs.prepare.outputs.promote-run-id }}
      # Tag the release-branch commit the artifact was built from (empty on
      # the rebuild path — _deploy.yml then tags this run's HEAD).
      source-sha: ${{ needs.prepare.outputs.promote-sha }}
      tag-deployment: true

  release:
    name: Create GitHub Release
    # Only when the deploy succeeded and this was a release merge push — not a
    # manual redeploy/rollback dispatch (release already exists for those versions).
    if: ${{ !failure() && !cancelled() && needs.prepare.outputs.version != '' && github.event_name == 'push' }}
    needs: [prepare, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release v${{ needs.prepare.outputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists — skipping."
          else
            gh release create "v$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "v$VERSION" \
              --generate-notes
          fi

  backmerge:
    name: Back-merge to develop
    # Its own job, parallel to deploy (not downstream of it): the merged
    # commits are already on main the moment the PR lands, so develop needs
    # them back regardless of how the prod deploy goes (fix-forward). Only
    # the deploy job carries the prod environment's approval gate — this job
    # starts as soon as the merge triggers the run. Push-only: dispatches
    # redeploy versions whose back-merge already happened.
    if: ${{ !failure() && !cancelled() && github.event_name == 'push' && needs.prepare.outputs.source-branch != '' }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Open back-merge PR to develop (release/hotfix)
        # Bookkeeping only — merging stays a human decision (conflicts with
        # ongoing develop work are possible). Skips gracefully if the source
        # branch is already gone or develop already contains it.
        if: ${{ !startsWith(needs.prepare.outputs.source-branch, 'support/') }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BRANCH: ${{ needs.prepare.outputs.source-branch }}
        run: |
          if ! gh api "repos/$GITHUB_REPOSITORY/branches/$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH no longer exists — skipping back-merge PR."
          elif [ -n "$(gh pr list --repo "$GITHUB_REPOSITORY" --base develop --head "$BRANCH" --state open --json number --jq '.[0].number')" ]; then
            echo "Back-merge PR already open — skipping."
          else
            # Only "no commits between" is benign; anything else (e.g. the
            # "Actions is not permitted to create PRs" repo setting) must
            # fail loudly instead of masquerading as "nothing to merge".
            OUTPUT=$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base develop \
              --head "$BRANCH" \
              --title "Back-merge $BRANCH into develop" \
              --body "Automated follow-up to merging \`$BRANCH\` into \`main\` (v$VERSION): brings its fixes back into \`develop\`. Merge with a merge commit." \
              2>&1) && echo "$OUTPUT" || {
                if echo "$OUTPUT" | grep -q "No commits between"; then
                  echo "No back-merge needed (develop already contains $BRANCH)."
                else
                  echo "::error::Back-merge PR creation failed: $OUTPUT"
                  exit 1
                fi
              }
          fi

      - name: Checkout for cherry-pick
        if: ${{ startsWith(needs.prepare.outputs.source-branch, 'support/') }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Cherry-pick support fix and open backport PR
        # A support branch is rooted at an old version tag — a branch merge
        # into develop would confront years of drifted history. Cherry-pick
        # the merge commit's combined diff (-m 1) onto develop instead.
        if: ${{ startsWith(needs.prepare.outputs.source-branch, 'support/') }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_BRANCH: ${{ needs.prepare.outputs.source-branch }}
        run: |
          BACKPORT="backport/$VERSION"
          if [ -n "$(gh pr list --repo "$GITHUB_REPOSITORY" --base develop --head "$BACKPORT" --state open --json number --jq '.[0].number')" ]; then
            echo "Backport PR already open — skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git checkout -B "$BACKPORT" origin/develop
          if ! git cherry-pick -m 1 "$GITHUB_SHA"; then
            if [ -z "$(git status --porcelain)" ]; then
              # Cherry-pick stopped because it produced an empty commit —
              # develop already contains this change.
              git cherry-pick --abort 2>/dev/null || true
              echo "Nothing to backport — develop already contains this change."
              exit 0
            fi
            echo "::error::Cherry-pick of $GITHUB_SHA onto develop hit conflicts. Backport manually: git checkout -b $BACKPORT origin/develop && git cherry-pick -m 1 $GITHUB_SHA — resolve, push, and open a PR to develop."
            exit 1
          fi
          git push -u origin "$BACKPORT"
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base develop \
            --head "$BACKPORT" \
            --title "Backport $VERSION to develop" \
            --body "Automated follow-up to merging \`$SOURCE_BRANCH\` into \`main\` (v$VERSION): cherry-picks the support fix onto \`develop\` (the support branch's old-tag history is never merged directly). Merge with a merge commit."
