name: CI/CD — Main → PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Extract release version from merge commit
        id: version
        # When a release/X.Y.Z branch merges to main (merge commit, not
        # squash), stamp the build with that version. Otherwise empty →
        # _build.yml falls back to the YYYYMMDD.run_number label.
        # Message is passed via env, never interpolated into the script.
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(echo "$COMMIT_MESSAGE" | head -1 | grep -oE 'release/[0-9]+\.[0-9]+\.[0-9]+' | head -1 | cut -d/ -f2 || true)
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: '${VERSION:-<none, using date label>}'"

  build:
    needs: prepare
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  deploy:
    needs: [prepare, build]
    # Callers must grant what the reusable workflow's job requests — the repo
    # default token is read-only and called workflows cannot elevate it.
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      webapp-name: prod-demo-helloworld-api
      azure-client-id: 279d0dec-5668-4d48-a333-4186cde9f859
      build-label: ${{ needs.build.outputs.build-label }}

  release:
    name: Create GitHub Release
    # Only when the deploy succeeded and this push was a release merge.
    if: needs.prepare.outputs.version != ''
    needs: [prepare, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create release v${{ needs.prepare.outputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists — skipping."
          else
            gh release create "v$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "v$VERSION" \
              --generate-notes
          fi

      - name: Open back-merge PR to develop
        # Bookkeeping only — merging stays a human decision (conflicts with
        # ongoing develop work are possible). Skips gracefully if the release
        # branch is already gone or develop already contains it.
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          BRANCH="release/$VERSION"
          if ! gh api "repos/$GITHUB_REPOSITORY/branches/$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH no longer exists — skipping back-merge PR."
          elif [ -n "$(gh pr list --repo "$GITHUB_REPOSITORY" --base develop --head "$BRANCH" --state open --json number --jq '.[0].number')" ]; then
            echo "Back-merge PR already open — skipping."
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base develop \
              --head "$BRANCH" \
              --title "Back-merge release $VERSION into develop" \
              --body "Automated follow-up to the v$VERSION production release: brings stabilization fixes from \`$BRANCH\` back into \`develop\`. Merge with a merge commit. If this PR shows no diff, develop already contains the release and it can be closed." \
              || echo "No back-merge needed (develop already contains $BRANCH)."
          fi
