name: Build

on:
  workflow_call:
    inputs:
      version:
        description: >
          Optional version override for release branches (e.g. 1.1.0-rc.5).
          Defaults to YYYYMMDD.run_number when omitted (develop, hotfix).
        type: string
        required: false
        default: ''
      solution:
        description: Solution file to restore and build
        type: string
        required: false
        default: 'cicd-demo.sln'
      artifact-name:
        description: >
          Name for the uploaded publish artifact. Promotable builds use a
          commit-keyed name (webapp-<sha>) so later prod deploys can find them.
        type: string
        required: false
        default: 'webapp-publish'
      retention-days:
        description: Artifact retention (promotable builds keep 90 days)
        type: number
        required: false
        default: 1
    outputs:
      build-label:
        description: Resolved build label used for assembly version and deployment tag
        value: ${{ jobs.build.outputs.build-label }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      build-label: ${{ steps.set-label.outputs.value }}
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set build label
        id: set-label
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(date +'%Y%m%d').${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ inputs.solution }}

      - name: Build
        # InformationalVersion must be set at build time — the assembly
        # attribute is compiled in here; publish below runs with --no-build.
        run: >
          dotnet build ${{ inputs.solution }}
          --configuration Release
          --no-restore
          /p:InformationalVersion=${{ steps.set-label.outputs.value }}

      - name: Test
        id: test
        run: >
          dotnet test Api.Test/Api.Test.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: TestResults/*.trx

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error::Tests failed — see the Test Results check above for details."
          exit 1

      - name: Publish
        run: >
          dotnet publish Api/Api.csproj
          --configuration Release
          --no-build
          --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./publish
          retention-days: ${{ inputs.retention-days }}
