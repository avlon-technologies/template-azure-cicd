name: Build

on:
  workflow_call:
    inputs:
      version:
        description: >
          Build label to stamp into InformationalVersion. Release, milestone,
          hotfix, and support callers pass their commit-derived label here.
          Defaults to YYYYMMDD.run_number when omitted (develop builds and
          the version-less main rebuild escape hatch).
        type: string
        required: false
        default: ''
      solution:
        description: Solution file to restore and build
        type: string
        required: false
        default: 'cicd-demo.sln'
      artifact-name:
        description: >
          Name for the uploaded publish artifact. Promotable builds use a
          commit-keyed name (webapp-<sha>) so later prod deploys can find them.
        type: string
        required: false
        default: 'webapp-publish'
      retention-days:
        description: Artifact retention (promotable builds keep 90 days)
        type: number
        required: false
        default: 1
      attest:
        description: >
          Sign a build-provenance attestation for the artifact manifest and
          generate an SBOM. Every deployable build sets this (entry
          workflows); PR validation builds don't — attesting needs
          id-token/attestations permissions that fork PRs cannot be
          granted. _deploy.yml refuses artifacts without an attested
          manifest.
        type: boolean
        required: false
        default: false
    outputs:
      build-label:
        description: Resolved build label used for assembly version and deployment tag
        value: ${{ jobs.build.outputs.build-label }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      build-label: ${{ steps.set-label.outputs.value }}
    # No permissions block: the job inherits exactly what the caller grants
    # (a called workflow can never exceed it). Callers grant contents: read,
    # checks: write, pull-requests: write — plus id-token: write and
    # attestations: write when they set attest: true. Declaring the union
    # here instead would break fork PRs, which can never be granted
    # id-token: write.

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set build label
        id: set-label
        # Inputs pass via env, never interpolated into the script.
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "value=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date +'%Y%m%d').$RUN_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        # --locked-mode: the committed packages.lock.json files are the
        # dependency source of truth — a resolution that differs from them
        # (new transitive version, tampered feed) fails here instead of
        # silently entering the artifact. After changing a PackageReference,
        # run `dotnet restore` locally and commit the updated lock files.
        run: dotnet restore ${{ inputs.solution }} --locked-mode

      - name: Build
        # InformationalVersion must be set at build time — the assembly
        # attribute is compiled in here; publish below runs with --no-build.
        # RepositoryUrl becomes assembly metadata (see Api.csproj) that the
        # app's Swagger description uses for its commit link, so the link
        # follows the repo wherever it's hosted (forks, renames).
        env:
          BUILD_LABEL: ${{ steps.set-label.outputs.value }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: >
          dotnet build ${{ inputs.solution }}
          --configuration Release
          --no-restore
          /p:InformationalVersion="$BUILD_LABEL"
          /p:RepositoryUrl="$REPO_URL"

      - name: Test
        id: test
        run: >
          dotnet test Api.Test/Api.Test.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: ./TestResults/
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: always()
        with:
          files: TestResults/*.trx

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error::Tests failed — see the Test Results check above for details."
          exit 1

      - name: Publish
        run: >
          dotnet publish Api/Api.csproj
          --configuration Release
          --no-build
          --output ./publish

      - name: Write artifact manifest
        # SHA256SUMS covers every published file and ships inside the
        # artifact. The attestation below signs the manifest, so verifying
        # the manifest's attestation + re-hashing the files proves the
        # deployed bytes are the bytes this workflow built (_deploy.yml
        # does both before every deploy).
        run: |
          cd publish
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          echo "Manifest covers $(wc -l < SHA256SUMS) files."

      - name: Attest build provenance
        if: inputs.attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: publish/SHA256SUMS

      - name: Generate SBOM
        # Software bill of materials for the published output, uploaded as
        # a companion artifact (<artifact-name>.sbom). Deployable builds
        # only — PR builds are throwaway.
        if: inputs.attest
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./publish
          format: spdx-json
          artifact-name: ${{ inputs.artifact-name }}.sbom.spdx.json
          upload-artifact-retention: ${{ inputs.retention-days }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ./publish
          retention-days: ${{ inputs.retention-days }}

      - name: Write build-label marker
        # Companion to commit-keyed (promotable) artifacts: an artifact whose
        # NAME records the label the binary was stamped with
        # (<artifact-name>.label.<label>), so a later dispatch can check a
        # requested label against the existing artifact without downloading
        # it. The default throwaway artifact name doesn't need one.
        if: inputs.artifact-name != 'webapp-publish'
        env:
          BUILD_LABEL: ${{ steps.set-label.outputs.value }}
        run: printf '%s\n' "$BUILD_LABEL" > "$RUNNER_TEMP/build-label-marker"

      - name: Upload build-label marker
        if: inputs.artifact-name != 'webapp-publish'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}.label.${{ steps.set-label.outputs.value }}
          path: ${{ runner.temp }}/build-label-marker
          retention-days: ${{ inputs.retention-days }}
