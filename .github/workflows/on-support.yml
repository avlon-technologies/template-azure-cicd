name: CI/CD — Support → STG

on:
  push:
    branches:
      - support/**
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.4.1-rc.1). Leave empty for an auto-generated build label.'
        required: false
        type: string

# Dispatches deploy to stg — serialize them with the other stg pipelines
# (release/hotfix share the group). Pushes only build, so they queue per
# branch instead of blocking each other across branches.
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'deploy-stg' || format('build-{0}', github.ref) }}
  cancel-in-progress: false

jobs:
  pipeline:
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: ./.github/workflows/_hotfix-support.yml
    with:
      branch-type: support
      version: ${{ inputs.version || '' }}
      event-name: ${{ github.event_name }}
      ref-name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      run-number: ${{ github.run_number }}
